<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Weekly Spiritual Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --mon: #7C3AED; --mon-light: #EDE9FE;
    --tue: #DB2777; --tue-light: #FCE7F3;
    --wed: #2563EB; --wed-light: #DBEAFE;
    --thu: #059669; --thu-light: #D1FAE5;
    --fri: #D97706; --fri-light: #FEF3C7;
    --sat: #DC2626; --sat-light: #FEE2E2;
    --sun: #0891B2; --sun-light: #CFFAFE;
    --bg: #F8F7FF;
    --card: #FFFFFF;
    --text: #1e1b4b;
    --muted: #6b7280;
    --radius: 18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* TOP HEADER */
  .hero {
    background: linear-gradient(135deg, #7C3AED 0%, #2563EB 50%, #059669 100%);
    padding: 56px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .hero h1 {
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: white;
    letter-spacing: 0.5px;
    position: relative;
  }
  .hero p {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-top: 4px;
    font-weight: 600;
    position: relative;
  }

  /* PROGRESS SECTION */
  .progress-wrap {
    margin: -18px 16px 0;
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 4px 24px rgba(124,58,237,0.12);
    position: relative;
    z-index: 10;
  }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .progress-pct {
    font-family: 'Pacifico', cursive;
    font-size: 32px;
    color: var(--mon);
    min-width: 72px;
  }
  .progress-info { flex: 1; }
  .progress-info .label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .progress-info .count { font-size: 15px; font-weight: 800; color: var(--text); }
  .progress-track {
    height: 10px;
    background: #EDE9FE;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #7C3AED, #2563EB, #059669);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* MOTIVATION BOX */
  .motivation {
    margin: 12px 16px 0;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    line-height: 1.5;
    transition: all 0.4s;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 6px;
    padding: 14px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 800;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    color: var(--muted);
  }
  .day-tab.active {
    color: white;
    border-color: transparent;
  }
  .day-tab .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
    background: #10b981;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .day-tab.complete .dot { opacity: 1; }

  /* DAY PANEL */
  .day-panel {
    display: none;
    margin: 12px 16px 0;
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .day-panel.active { display: block; }

  .day-panel-header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-panel-header .day-title {
    font-family: 'Pacifico', cursive;
    font-size: 22px;
  }
  .day-progress-pill {
    font-size: 12px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 99px;
  }

  .task-list { padding: 0 0 8px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    border-top: 1px solid #f3f4f6;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .task-item:active { background: #f9fafb; }
  .task-item:first-child { border-top: none; }

  .checkbox {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid #d1d5db;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 13px;
  }
  .task-item.done .checkbox {
    border-color: transparent;
    color: white;
  }
  .task-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.2s;
    flex: 1;
  }
  .task-item.done .task-label {
    text-decoration: line-through;
    color: #9ca3af;
    font-weight: 600;
  }

  .all-done-banner {
    display: none;
    margin: 10px 18px 16px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    text-align: center;
    font-size: 14px;
    font-weight: 800;
  }
  .all-done-banner.show { display: block; }

  /* WEEK OVERVIEW */
  .overview-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 18px 16px 8px;
  }
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    padding: 0 16px;
  }
  .overview-cell {
    text-align: center;
    padding: 8px 0;
    border-radius: var(--radius-sm);
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .overview-cell .oc-day { font-size: 10px; font-weight: 800; color: var(--muted); }
  .overview-cell .oc-pct { font-size: 14px; font-weight: 800; margin-top: 2px; }
  .overview-cell .oc-bar {
    height: 4px;
    background: #e5e7eb;
    border-radius: 99px;
    margin: 4px 6px 0;
    overflow: hidden;
  }
  .overview-cell .oc-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s;
  }

  /* RESET */
  .reset-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 16px 16px 0;
    padding: 14px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 2px solid #e5e7eb;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active { background: #f3f4f6; }

  .today-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 99px;
    background: rgba(255,255,255,0.3);
    color: white;
    vertical-align: middle;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>✨ Spiritual Tracker</h1>
  <p id="hero-sub">Let's have a great week!</p>
</div>

<div class="progress-wrap">
  <div class="progress-row">
    <div class="progress-pct" id="pct">0%</div>
    <div class="progress-info">
      <div class="label">Weekly progress</div>
      <div class="count" id="count-label">0 / 0 tasks complete</div>
    </div>
    <div style="font-size:32px" id="trophy-icon">🌱</div>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="bar"></div>
  </div>
</div>

<div class="motivation" id="motivation-box">Tap a day below to get started!</div>

<!-- Day Tabs -->
<div class="day-tabs" id="day-tabs"></div>

<!-- Day Panels -->
<div id="panels"></div>

<!-- Week Overview -->
<div class="overview-title">Week overview</div>
<div class="overview-grid" id="overview-grid"></div>

<button class="reset-btn" onclick="resetAll()">↺ Reset entire week</button>

<script>
const DAYS = [
  { id: 'mon', name: 'Monday',    short: 'Mon', color: '#7C3AED', light: '#EDE9FE', tasks: ['Daily Text','Bible Reading','Treasures','LAC','Parts'] },
  { id: 'tue', name: 'Tuesday',   short: 'Tue', color: '#DB2777', light: '#FCE7F3', tasks: ['Daily Text','Bible Reading','Gems'] },
  { id: 'wed', name: 'Wednesday', short: 'Wed', color: '#2563EB', light: '#DBEAFE', tasks: ['Daily Text','Bible Reading','Bible Study'] },
  { id: 'thu', name: 'Thursday',  short: 'Thu', color: '#059669', light: '#D1FAE5', tasks: ['Daily Text','Bible Reading','Midweek Meeting'] },
  { id: 'fri', name: 'Friday',    short: 'Fri', color: '#D97706', light: '#FEF3C7', tasks: ['Daily Text','Bible Reading','Watchtower (WT)'] },
  { id: 'sat', name: 'Saturday',  short: 'Sat', color: '#DC2626', light: '#FEE2E2', tasks: ['Daily Text','Bible Reading','Personal Study','Service'] },
  { id: 'sun', name: 'Sunday',    short: 'Sun', color: '#0891B2', light: '#CFFAFE', tasks: ['Daily Text','Bible Reading','Meeting','Service'] },
];

const QUOTES = [
  "You showed up. That's already a win! 🎉",
  "One tick at a time — you're doing amazing!",
  "Don't think about all of it. Just the NEXT one. 👉",
  "Even 5 minutes of focus is powerful. Let's go!",
  "You are more consistent than you think! 💪",
  "Progress over perfection. Every tick counts!",
  "Distracted? That's okay. You came back! 🙌",
  "Your future self is cheering you on right now!",
  "Small steps. Steady pace. Big results. 🌟",
  "Look how far you've come — keep going!",
  "The best time to start is RIGHT NOW. ⚡",
  "You've got this. Seriously — you really do! 🔥",
  "Just 2 more minutes of focus. You can do it!",
  "Every task you finish makes the next easier! 🚀",
  "Half done is so much better than not started! ✨",
];

const DONE_MESSAGES = [
  "🏆 CRUSHED IT! Day complete!",
  "🎊 All done! You're on fire!",
  "⭐ Perfect day! Incredible work!",
  "🌟 AMAZING! Full day complete!",
  "🔥 Beast mode! Everything done!",
];

let state = {};
const todayName = new Date().toLocaleDateString('en-US', { weekday: 'long' });

function key(day, task) { return day + '::' + task; }

function save() {
  try { localStorage.setItem('spiritual_v2', JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    const s = localStorage.getItem('spiritual_v2');
    if (s) state = JSON.parse(s);
  } catch(e) { state = {}; }
}

function dayStats(day) {
  const done = day.tasks.filter(t => state[key(day.id, t)]).length;
  return { done, total: day.tasks.length, pct: Math.round(done / day.tasks.length * 100) };
}

function totalStats() {
  let done = 0, total = 0;
  DAYS.forEach(d => { const s = dayStats(d); done += s.done; total += s.total; });
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function buildUI() {
  const tabsEl = document.getElementById('day-tabs');
  const panelsEl = document.getElementById('panels');
  const overviewEl = document.getElementById('overview-grid');
  tabsEl.innerHTML = ''; panelsEl.innerHTML = ''; overviewEl.innerHTML = '';

  DAYS.forEach((day, i) => {
    const isToday = day.name === todayName;

    // TAB
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (isToday ? ' active' : '');
    tab.id = 'tab-' + day.id;
    if (isToday) { tab.style.background = day.color; tab.style.color = 'white'; }
    tab.innerHTML = day.short + (isToday ? '<span class="today-badge">Today</span>' : '') + '<span class="dot"></span>';
    tab.onclick = () => switchDay(day.id);
    tabsEl.appendChild(tab);

    // PANEL
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (isToday ? ' active' : '');
    panel.id = 'panel-' + day.id;
    panel.innerHTML = `
      <div class="day-panel-header" style="background:${day.light}">
        <div class="day-title" style="color:${day.color}">${day.name}</div>
        <div class="day-progress-pill" id="pill-${day.id}" style="background:${day.color};color:white">0/${day.tasks.length}</div>
      </div>
      <div class="task-list" id="list-${day.id}"></div>
      <div class="all-done-banner" id="banner-${day.id}" style="background:${day.light};color:${day.color}"></div>
    `;
    panelsEl.appendChild(panel);

    day.tasks.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item' + (state[key(day.id, task)] ? ' done' : '');
      item.id = 'item-' + day.id + '-' + task.replace(/\s/g,'_');
      item.innerHTML = `
        <div class="checkbox" style="${state[key(day.id, task)] ? 'background:'+day.color : ''}">
          ${state[key(day.id, task)] ? '✓' : ''}
        </div>
        <div class="task-label">${task}</div>
      `;
      item.onclick = () => toggleTask(day, task);
      document.getElementById('list-' + day.id).appendChild(item);
    });

    // OVERVIEW CELL
    const cell = document.createElement('div');
    cell.className = 'overview-cell';
    cell.id = 'oc-' + day.id;
    cell.innerHTML = `
      <div class="oc-day">${day.short}</div>
      <div class="oc-pct" style="color:${day.color}" id="oc-pct-${day.id}">0%</div>
      <div class="oc-bar"><div class="oc-fill" id="oc-fill-${day.id}" style="background:${day.color};width:0%"></div></div>
    `;
    overviewEl.appendChild(cell);
  });

  // open today's tab by default, else Monday
  const todayDay = DAYS.find(d => d.name === todayName);
  if (!document.querySelector('.day-panel.active')) {
    switchDay(todayDay ? todayDay.id : DAYS[0].id);
  }

  refresh();
}

function switchDay(id) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  const day = DAYS.find(d => d.id === id);
  document.getElementById('panel-' + id).classList.add('active');
  const tab = document.getElementById('tab-' + id);
  tab.classList.add('active');
  tab.style.background = day.color;
  tab.style.color = 'white';
  DAYS.filter(d => d.id !== id).forEach(d => {
    const t = document.getElementById('tab-' + d.id);
    if (!t.classList.contains('active')) {
      t.style.background = '';
      t.style.color = '';
    }
  });
  tab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function toggleTask(day, task) {
  const k = key(day.id, task);
  state[k] = !state[k];
  save();
  const itemEl = document.getElementById('item-' + day.id + '-' + task.replace(/\s/g,'_'));
  if (itemEl) {
    itemEl.className = 'task-item' + (state[k] ? ' done' : '');
    const cb = itemEl.querySelector('.checkbox');
    cb.style.background = state[k] ? day.color : '';
    cb.innerHTML = state[k] ? '✓' : '';
  }
  refresh();
  randomMotivation();
}

function refresh() {
  const ts = totalStats();
  document.getElementById('pct').textContent = ts.pct + '%';
  document.getElementById('bar').style.width = ts.pct + '%';
  document.getElementById('count-label').textContent = ts.done + ' / ' + ts.total + ' tasks complete';

  const icons = ['🌱','🌿','⭐','🔥','🏆','🎊'];
  document.getElementById('trophy-icon').textContent = icons[Math.min(Math.floor(ts.pct / 20), 5)];

  DAYS.forEach(day => {
    const s = dayStats(day);
    const pill = document.getElementById('pill-' + day.id);
    if (pill) pill.textContent = s.done + '/' + s.total;
    const tab = document.getElementById('tab-' + day.id);
    if (tab) tab.classList.toggle('complete', s.done === s.total);
    const banner = document.getElementById('banner-' + day.id);
    if (banner) {
      if (s.done === s.total) {
        banner.classList.add('show');
        banner.textContent = DONE_MESSAGES[Math.floor(Math.random() * DONE_MESSAGES.length)];
      } else {
        banner.classList.remove('show');
      }
    }
    const ocPct = document.getElementById('oc-pct-' + day.id);
    if (ocPct) ocPct.textContent = s.pct + '%';
    const ocFill = document.getElementById('oc-fill-' + day.id);
    if (ocFill) ocFill.style.width = s.pct + '%';
  });

  const heroSub = document.getElementById('hero-sub');
  if (ts.pct === 100) heroSub.textContent = '🏆 Perfect week! You\'re incredible!';
  else if (ts.pct >= 75) heroSub.textContent = '🔥 Almost there — push to the finish!';
  else if (ts.pct >= 50) heroSub.textContent = '⭐ Halfway there — great momentum!';
  else if (ts.pct >= 25) heroSub.textContent = '🌿 Good start — keep it going!';
  else heroSub.textContent = 'Let\'s have a great week!';
}

function randomMotivation() {
  const box = document.getElementById('motivation-box');
  const colors = [
    { bg: '#EDE9FE', text: '#5B21B6' },
    { bg: '#D1FAE5', text: '#065F46' },
    { bg: '#DBEAFE', text: '#1E40AF' },
    { bg: '#FEF3C7', text: '#92400E' },
    { bg: '#FCE7F3', text: '#9D174D' },
    { bg: '#CFFAFE', text: '#164E63' },
  ];
  const c = colors[Math.floor(Math.random() * colors.length)];
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  box.style.background = c.bg;
  box.style.color = c.text;
  box.textContent = q;
}

function resetAll() {
  if (!confirm('Reset all tasks for the week?')) return;
  state = {};
  save();
  buildUI();
  document.getElementById('motivation-box').textContent = 'Fresh start! You\'ve got this! 🌱';
  document.getElementById('motivation-box').style.background = '#EDE9FE';
  document.getElementById('motivation-box').style.color = '#5B21B6';
}

load();
buildUI();
randomMotivation();
setInterval(randomMotivation, 15000);
</script>
</body>
</html>
